name: Build Aseprite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Visual Studio
        uses: actions/setup-msbuild@v1

      - name: Install CMake
        uses: actions/setup-cmake@v3
        with:
          cmake-version: '3.20.0'

      - name: Install Ninja
        uses: actions/setup-ninja@v1

      - name: Install Skia dependencies
        run: |
          # Commands to download and set up Skia
          # Ensure SKIA_DIR and SKIA_LIBRARY_DIR are set appropriately

      - name: Configure build
        run: |
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DLAF_BACKEND=skia ^
            -DSKIA_DIR=%SKIA_DIR% ^
            -DSKIA_LIBRARY_DIR=%SKIA_LIBRARY_DIR%

      - name: Build Aseprite
        run: cmake --build build --target aseprite

      - name: Archive build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: aseprite-windows
          path: build/bin/aseprite.exe
