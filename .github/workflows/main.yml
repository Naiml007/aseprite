name: Build and Release Aseprite

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y
          choco install 7zip -y

      - name: Download and build FreeType
        run: |
          git clone https://github.com/freetype/freetype.git
          cd freetype
          git checkout VER-2-10-4
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target install

      - name: Configure CMake
        run: |
          cmake -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DFREETYPE_DIR=C:\Program Files\freetype

      - name: Build Aseprite
        run: cmake --build build --target aseprite

      - name: Package the executable
        run: |
          mkdir dist
          copy build\bin\aseprite.exe dist\
          7z a aseprite.zip .\dist\*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          files: aseprite.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
