name: Build and Release Aseprite on Windows

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install dependencies
      run: |
        choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
        choco install ninja -y
        choco install 7zip -y
        choco install freetype -y

    - name: Create build directory
      run: mkdir build

    - name: Configure CMake
      working-directory: ./build
      run: |
        cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DFREETYPE_INCLUDE_DIRS="C:/tools/freetype/include" -DFREETYPE_LIBRARY="C:/tools/freetype/lib/freetype.lib" ..

    - name: Build Aseprite
      working-directory: ./build
      run: ninja

    - name: Archive the executable
      run: |
        mkdir dist
        cp build/bin/aseprite.exe dist/
        7z a aseprite.zip ./dist/*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref }}
        name: Release ${{ github.ref }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref }}
        files: aseprite.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
